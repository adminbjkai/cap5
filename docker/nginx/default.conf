server {
    listen 80;
    resolver 127.0.0.11 ipv6=off valid=10s;
    set $minio_upstream http://minio:9000;
    set $web_api_upstream http://web-api:3000;

    # Allow large video uploads (up to 2 GB). The default nginx limit is 1 MB
    # which would silently reject any real video upload.
    client_max_body_size 2g;

    # Serve built static files from /usr/share/nginx/html
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Docker-first object access (public bucket). The frontend may use same-origin
    # URLs like `/<bucket>/<key>` for robustness; proxy those to MinIO.
    location /cap5/ {
        proxy_pass $minio_upstream/cap5/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Proxy /api requests to web-api service
    location /api {
        proxy_pass $web_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy /health to web-api
    location /health {
        proxy_pass $web_api_upstream/health;
        proxy_set_header Host $host;
    }
}
